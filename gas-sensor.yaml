# ══════════════════════════════════════════════════════════════
#  MING Stack — ESPHome gas-sensor.yaml
#  Placa   : RobotDyn UNO+WiFi R3 (ESP8266 integrado)
#  Sensor  : MQ-135 → TOUT (único ADC del ESP8266)
#  Tópico  : sensor/gas
#
#  CADA GRUPO EDITA SOLO UNA LÍNEA:
#  broker: "X.X.X.X"  ← IP del PC donde corre Docker
#
#  CONFIGURAR WIFI (sin editar el YAML):
#  1. Encender ESP → levanta AP: MING-Gas-XXXX (pass: ming12345)
#  2. Conectarse al AP → abrir 192.168.4.1
#  3. Ingresar red WiFi y contraseña → Guardar
#
#  SUBIR POR OTA:
#  python -m esphome run gas-sensor.yaml --device <IP-del-ESP>
#
#  SWITCHES modo RUN:
#  SW1-OFF SW2-OFF SW3-OFF SW4-OFF SW5-ON SW6-ON SW7-OFF SW8-libre
# ══════════════════════════════════════════════════════════════

esphome:
  name: ming-gas-sensor
  friendly_name: "MING Sensor Gas MQ-135"
  name_add_mac_suffix: true    # AP único por dispositivo: MING-Gas-XXXX

esp8266:
  board: esp01_1m

# ── WiFi ─────────────────────────────────────────────────────
wifi:
  min_auth_mode: WPA2
  ap:
    ssid: "MING-Gas"
    password: "ming12345"

captive_portal:

# ── Logs ─────────────────────────────────────────────────────
logger:
  level: INFO

# ── OTA ──────────────────────────────────────────────────────
ota:
  - platform: esphome
    password: "ming-ota-pass"

# ── MQTT → Mosquitto ─────────────────────────────────────────
mqtt:
  broker: "192.168.0.252"    # ← CAMBIAR: IP del PC donde corre Docker
  port: 1883
  client_id: ming-gas-sensor
  birth_message:
    topic: sensor/status
    payload: "online"
  will_message:
    topic: sensor/status
    payload: "offline"

# ── Sensor MQ-135 ────────────────────────────────────────────
sensor:
  - platform: adc
    pin: A0                    # TOUT del ESP8266 — único pin ADC
    name: "Gas MQ-135"
    unit_of_measurement: "ppm"
    accuracy_decimals: 0
    update_interval: 5s
    filters:
      - multiply: 1023.0       # Voltaje 0.0–1.0 V → escala 0–1023
      - delta: 1.0             # Solo publica si cambia ≥ 1 unidad
    on_value:
      then:
        - mqtt.publish:
            topic: sensor/gas
            payload: !lambda 'return to_string((int)x);'
